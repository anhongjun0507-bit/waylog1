name: Android Release AAB

# 수동 실행 (Actions 탭 → "Run workflow") 또는 v* 태그 push 시 자동 실행.
# 결과: app-release.aab 가 빌드되어 워크플로 결과 페이지의 Artifacts 에 첨부됨.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;34.0.0'

      - name: Install npm deps
        run: npm ci

      - name: Vite production build
        run: npm run build
        env:
          # Vercel 과 동일한 Supabase 자격증명을 GitHub Secrets 에 등록해두면
          # 네이티브 앱도 같은 백엔드에 연결됨.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Capacitor sync android
        run: npx cap sync android

      - name: Decode upload keystore
        run: |
          mkdir -p android/keystores
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/keystores/upload.jks
          ls -la android/keystores/

      - name: Write keystore.properties
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=keystores/upload.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Gradle bundleRelease
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 30
