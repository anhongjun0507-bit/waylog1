<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#10b981" />
    <meta name="description" content="웨이로그 — 라이프스타일 리뷰와 8주 챌린지를 한 곳에서." />
    <!-- 외부 CDN(hotlink) 이미지 로드 시 경로만 referrer 로 보냄 (개인 식별 정보 유출 방지) -->
    <meta name="referrer" content="no-referrer-when-downgrade" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="웨이로그" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph -->
    <meta property="og:title" content="웨이로그" />
    <meta property="og:description" content="라이프스타일 리뷰와 8주 챌린지" />
    <meta property="og:type" content="website" />

    <title>웨이로그 | Waylog</title>

    <!-- Auth fix v4: stale 세션 + SW 완전 제거. React 로드 전 실행. -->
    <script>
    (function(){
      // SW가 남아있으면 무조건 해제 + 캐시 삭제 (매번)
      try {
        if (navigator.serviceWorker) {
          navigator.serviceWorker.getRegistrations().then(function(regs){
            regs.forEach(function(r){ r.unregister(); });
          });
        }
        if ('caches' in window) {
          caches.keys().then(function(ns){
            ns.forEach(function(n){ caches.delete(n); });
          });
        }
      } catch(e) {}
      // stale 인증 데이터 일회성 정리
      try {
        var AUTH_VER = 4;
        var cur = +localStorage.getItem('waylog:auth-ver');
        if (cur < AUTH_VER) {
          var keys = Object.keys(localStorage);
          for (var i = 0; i < keys.length; i++) {
            if (keys[i].indexOf('sb-') === 0 || keys[i].indexOf('supabase') === 0) {
              localStorage.removeItem(keys[i]);
            }
          }
          localStorage.setItem('waylog:auth-ver', String(AUTH_VER));
        }
      } catch(e) {}
    })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
