<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0071CE" />
    <meta name="description" content="웨이로그 — 라이프스타일 리뷰와 8주 챌린지를 한 곳에서." />
    <!-- 외부 CDN(hotlink) 이미지 로드 시 경로만 referrer 로 보냄 (개인 식별 정보 유출 방지) -->
    <meta name="referrer" content="no-referrer-when-downgrade" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="웨이로그" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph -->
    <meta property="og:title" content="웨이로그" />
    <meta property="og:description" content="라이프스타일 리뷰와 8주 챌린지" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1024" />
    <meta property="og:image:height" content="500" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/og-image.png" />

    <title>웨이로그 | Waylog</title>

    <!-- SW 자폭 — 1.0.x 잘못 등록된 Service Worker 정리. React 로드 전 실행. -->
    <!-- 주의: firebase-messaging-sw.js 는 보존해야 웹 백그라운드 푸시 가능 (audit P0-6). -->
    <!-- auth 세션 정리는 src/supabase.js 의 migrateLocalStorage() 가 담당. -->
    <script>
    (function(){
      try {
        if (navigator.serviceWorker) {
          navigator.serviceWorker.getRegistrations().then(function(regs){
            regs.forEach(function(r){
              var url = (r.active && r.active.scriptURL)
                || (r.installing && r.installing.scriptURL)
                || (r.waiting && r.waiting.scriptURL)
                || '';
              if (url.indexOf('firebase-messaging-sw') !== -1) return;
              r.unregister();
            });
          });
        }
        // caches 정리는 그대로 — firebase-messaging-sw 는 cache 를 사용하지 않음.
        if ('caches' in window) {
          caches.keys().then(function(ns){
            ns.forEach(function(n){ caches.delete(n); });
          });
        }
      } catch(e) {}
    })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
