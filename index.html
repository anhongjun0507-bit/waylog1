<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#10b981" />
    <meta name="description" content="웨이로그 — 라이프스타일 리뷰와 8주 챌린지를 한 곳에서." />
    <!-- 외부 CDN(hotlink) 이미지 로드 시 경로만 referrer 로 보냄 (개인 식별 정보 유출 방지) -->
    <meta name="referrer" content="no-referrer-when-downgrade" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="웨이로그" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Open Graph -->
    <meta property="og:title" content="웨이로그" />
    <meta property="og:description" content="라이프스타일 리뷰와 8주 챌린지" />
    <meta property="og:type" content="website" />

    <title>웨이로그 | Waylog</title>

    <!-- Auth fix v3: stale 세션 + SW 캐시 정리. React 로드 전 실행. -->
    <script>
    (function(){
      var AUTH_VER = 3;
      try {
        var cur = +localStorage.getItem('waylog:auth-ver');
        if (cur < AUTH_VER) {
          // 1) stale 인증 데이터 삭제
          var keys = Object.keys(localStorage);
          for (var i = 0; i < keys.length; i++) {
            if (keys[i].indexOf('sb-') === 0 || keys[i].indexOf('supabase') === 0) {
              localStorage.removeItem(keys[i]);
            }
          }
          localStorage.setItem('waylog:auth-ver', String(AUTH_VER));
          // 2) SW 캐시 전부 삭제 + SW 해제 → 리로드로 최신 코드 적용
          if ('caches' in window) {
            caches.keys().then(function(ns){
              return Promise.all(ns.map(function(n){ return caches.delete(n); }));
            }).then(function(){
              if (!navigator.serviceWorker) return;
              return navigator.serviceWorker.getRegistrations();
            }).then(function(regs){
              if (!regs) return;
              return Promise.all(regs.map(function(r){ return r.unregister(); }));
            }).then(function(){
              window.location.reload();
            });
            return; // reload 대기 — 아래 React 로드하지 않음
          }
        }
      } catch(e) {}
    })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
